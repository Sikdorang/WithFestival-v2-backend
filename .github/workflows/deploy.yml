name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/app

            git pull origin main

            podman build -t my-app .

            podman stop my-app || true
            podman rm my-app || true

            podman run -d \
              --name my-app \
              -p 3000:3000 \
              my-app
