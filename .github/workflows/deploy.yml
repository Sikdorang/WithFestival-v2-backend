name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -f Containerfile -t my-app .

      - name: Save Image
        run: docker save my-app | gzip > my-app.tar.gz

      - name: Copy Image to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "my-app.tar.gz"
          target: "~/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~

            podman stop my-app 2>/dev/null || true
            podman rm my-app 2>/dev/null || true
            podman rmi my-app 2>/dev/null || true

            gunzip -c my-app.tar.gz | podman load

            podman run -d \
              --name my-app \
              --restart=always \
              --network my-network \
              -p 3000:3000 \
              --env-file ~/WithFestival-v2-backend/.env \
              my-app
